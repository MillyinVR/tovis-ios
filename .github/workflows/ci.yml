name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The wire-contract gate. Validates every fixture in
  # TovisKit/Tests/TovisKitTests/Fixtures against tovis-app's generated API
  # schema, so a backend DTO change fails HERE instead of silently breaking
  # decode at runtime. Runs on Linux — it is just node+ajv — so it stays on the
  # 1x billing multiplier.
  contract:
    name: Wire contract (fixtures vs backend schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The schema is GENERATED in tovis-app, where `check:api-schema` already
      # guarantees the committed copy matches lib/dto/index.ts. We read it live
      # from that repo rather than vendoring a snapshot here: a vendored copy
      # would drift the moment a DTO changed, and this job would stay GREEN
      # while the wire contract rotted — the exact failure the gate exists to
      # catch. Auth is a read-only deploy key (secret TOVIS_APP_DEPLOY_KEY);
      # both repos are private, so some credential is unavoidable.
      - name: Fetch backend API schema (read-only deploy key)
        uses: actions/checkout@v7
        with:
          repository: MillyinVR/tovis-app
          ssh-key: ${{ secrets.TOVIS_APP_DEPLOY_KEY }}
          path: .tovis-app
          sparse-checkout: schema/api
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/contract/package-lock.json

      - name: Install ajv
        working-directory: scripts/contract
        run: npm ci

      - name: Validate fixtures against the backend schema
        working-directory: scripts/contract
        env:
          TOVIS_API_SCHEMA: ${{ github.workspace }}/.tovis-app/schema/api/tovis-api.schema.json
        run: npm run validate

  ios:
    name: TovisKit tests
    # macOS bills at 10x on private repos. This job used to also run
    # `xcodebuild test`, which was ~9 of its ~11 minutes — about 110 billable
    # minutes per run, and several runs in one day were enough to exhaust the
    # account's Actions allowance and refuse EVERY workflow across both repos.
    # `swift test` needs no simulator and no network (TovisKit has no external
    # SPM dependencies), so it keeps the signal that matters here — including
    # decode of the same fixtures the contract job validates — at ~a fifth of
    # the cost. See the app-target compile gap noted in BACKLOG.md.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: swift --version

      # TovisKit has no external SPM dependencies, so this needs no network and
      # no simulator — it is the cheapest real signal in the repo. It also
      # decodes the same Fixtures/*.json the contract job validates, so the two
      # jobs check the fixtures from both sides: shape (ajv) and decode (Swift).
      - name: TovisKit — swift test
        working-directory: TovisKit
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/swift-test.log"
          swift test 2>&1 | tee "$log"
          # A misconfigured or undiscovered test target reports SUCCESS having
          # run nothing. Assert the run was non-empty so a silently-empty gate
          # cannot pass as green.
          count=$(grep -oE 'Test run with [0-9]+ test' "$log" \
            | grep -oE '[0-9]+' | tail -1)
          if [ -z "$count" ] || [ "$count" -lt 1 ]; then
            echo "::error::TovisKit reported success but ran no tests"
            exit 1
          fi
          echo "TovisKit tests executed: $count" >> "$GITHUB_STEP_SUMMARY"
